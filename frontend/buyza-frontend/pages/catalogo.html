<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - Buyza</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .paginacion-container { display: flex; justify-content: center; align-items: center; gap: 1.5rem; margin-top: 3rem; }
    .btn-paginacion { padding: 0.75rem 1.5rem; background: var(--primary); border: 1px solid var(--primary); border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: white; }
    .btn-paginacion:hover:not(:disabled) { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-paginacion:disabled { background: var(--gray-300); border-color: var(--gray-300); color: var(--gray-500); cursor: not-allowed; }
    .info-pagina { font-weight: 700; color: var(--gray-700); font-size: 0.95rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="../index.html">Buyza</a>
  <div class="navbar-links">
    <a href="../index.html" class="nav-link">Inicio</a>
    <a href="perfil.html" class="nav-link">Mi Perfil</a>
    <div id="btn-vendedor-container"></div>
    <a href="#" onclick="cerrarSesion()" class="btn-nav">Cerrar sesión</a>
  </div>
</nav>

<div style="padding: 100px 2rem; max-width: 1200px; margin: 0 auto;">
  <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem">
    <h1>Explorar <span>Productos</span></h1>
  </div>
  <div id="alerta" class="alert"></div>
  
  <div id="grid-productos" class="features-grid">
    <p id="loading-text" style="text-align:center; grid-column: 1/-1; color:var(--gray-400)">Cargando productos...</p>
  </div>

  <div class="paginacion-container">
    <button class="btn-paginacion" id="btnAnterior" onclick="cambiarPagina(-1)">Anterior</button>
    <span class="info-pagina" id="infoPagina">Página 1</span>
    <button class="btn-paginacion" id="btnSiguiente" onclick="cambiarPagina(1)">Siguiente</button>
  </div>
</div>

<script src="../js/config.js?v=1.1"></script>
<script src="../js/api.js?v=1.1"></script>
<script>
  const user = getUsuario();
  
  if (!user || !localStorage.getItem('token')) {
    window.location.href = 'login.html';
  }

  if(user && user.rol === 'vendedor') {
    document.getElementById('btn-vendedor-container').innerHTML = 
      `<a href="nuevo-producto.html" class="btn btn-primary" style="padding:0.5rem 1rem; font-size:0.8rem">+ Publicar Producto</a>`;
  }

  let paginaActual = 1;
  const limitePorPagina = 24;
  let tieneMasPaginas = false;

  async function cargarProductos() {
    const grid = document.getElementById('grid-productos');
    try {
      const productos = await catalogo.get(`?page=${paginaActual}&limit=${limitePorPagina}`);
      
      if (!productos || productos.error) {
        mostrarAlerta('alerta', productos?.error || 'Error al cargar productos', 'error');
        grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color:var(--gray-400)">No se pudo cargar los productos.</p>';
        return;
      }
      
      const lista = Array.isArray(productos) ? productos : (productos.productos || []);
      
      if (typeof productos.total !== 'undefined') {
        const maxPaginas = Math.ceil(productos.total / limitePorPagina) || 1;
        tieneMasPaginas = paginaActual < maxPaginas;
      } else {
        tieneMasPaginas = lista.length === limitePorPagina;
      }

      if (lista.length === 0) {
        grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color:var(--gray-400)">No hay productos disponibles.</p>';
        actualizarControlesPaginacion();
        return;
      }

      grid.innerHTML = lista.map(p => `
        <div class="feature-card">
          <div class="feature-icon" style="background:var(--primary-light); color:var(--primary); width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:1rem">📦</div>
          <h3 style="margin-bottom:0.5rem">${p.nombre}</h3>
          <p style="font-size:0.85rem; color:var(--gray-600); margin-bottom:1.5rem">${p.descripcion}</p>
          <div style="margin-top:auto; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--gray-100); padding-top:1rem">
            <span style="font-weight:800; color:var(--primary); font-size:1.2rem">${formatPeso(p.precio)}</span>
            <button onclick="comprar(${p.id})" class="btn btn-outline" style="padding:0.4rem 1rem; font-size:0.8rem">Comprar</button>
          </div>
          <div style="font-size:0.7rem; color:var(--gray-400); margin-top:0.5rem">Vendido por: ${p.vendedor_nombre || p.vendedor || 'Usuario'}</div>
        </div>
      `).join('');

      actualizarControlesPaginacion();
    } catch (err) {
      mostrarAlerta('alerta', 'Error de conexión con el servidor', 'error');
      grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color:var(--gray-400)">Error de red o configuración.</p>';
    }
  }

  function actualizarControlesPaginacion() {
    document.getElementById('infoPagina').textContent = `Página ${paginaActual}`;
    document.getElementById('btnAnterior').disabled = paginaActual === 1;
    document.getElementById('btnSiguiente').disabled = !tieneMasPaginas;
  }

  function cambiarPagina(direccion) {
    if (direccion === 1 && !tieneMasPaginas) return;
    if (direccion === -1 && paginaActual === 1) return;

    paginaActual += direccion;
    cargarProductos();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function comprar(id_producto) {
    if (window._comprando) return;
    window._comprando = true;
    setTimeout(() => window._comprando = false, 3000);
    try {
      const res = await ordenes.post('/crear', { id_producto });
      if(res && res.id_orden) {
        mostrarAlerta('alerta', 'Orden creada correctamente', 'success');
        setTimeout(() => {
          localStorage.setItem('orden_pendiente', String(res.id_orden));
          window.location.href = '/pages/pago';
        }, 1200);
      } else {
        mostrarAlerta('alerta', res?.error || 'Error al procesar compra', 'error');
      }
    } catch (err) {
      mostrarAlerta('alerta', 'Error al procesar la orden', 'error');
    }
  }

  window.onload = cargarProductos;
</script>
</body>
</html>

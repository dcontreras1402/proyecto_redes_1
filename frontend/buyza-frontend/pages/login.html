<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Buyza</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="../index.html">Buyza</a>
  <div class="navbar-links">
    <a href="../index.html" class="nav-link">Inicio</a>
    <a href="registro.html" class="btn-nav">Registrarse</a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="card">
    <div class="card-header">
      <h2>Bienvenido de nuevo</h2>
      <p>Ingresa tus datos para continuar en Buyza</p>
    </div>

    <div id="alerta" class="alert"></div>

    <form id="formLogin">
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="Tu contraseña" required>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="btnLogin">
        Iniciar sesión
      </button>
    </form>

    <div class="divider">o</div>

    <p style="text-align:center; font-size:0.9rem; color:var(--gray-600)">
      ¿No tienes cuenta?
      <a href="registro.html" style="color:var(--primary); font-weight:600; text-decoration:none">Regístrate aquí</a>
    </p>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
  const checkSession = () => {
    const user = getUsuario();
    const token = localStorage.getItem('token');
    if (user && token) {
      window.location.href = user.rol === 'admin' ? 'admin.html' : 'perfil.html';
    }
  };
  checkSession();

  document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const alertaId = 'alerta';
    
    btn.innerHTML = '<span class="spinner"></span> Ingresando...';
    btn.disabled = true;

    const credentials = {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    };

    try {
      const res = await usuarios.post('/login', credentials);
      
      if (res && res.token) {
        localStorage.setItem('token', res.token);
        localStorage.setItem('usuario', JSON.stringify(res.usuario));
        
        mostrarAlerta(alertaId, 'Inicio de sesión exitoso. Redirigiendo...', 'success');
        
        setTimeout(() => {
          window.location.href = res.usuario.rol === 'admin' ? 'admin.html' : 'perfil.html';
        }, 1200);
      } else {
        throw new Error(res.error || 'Credenciales inválidas');
      }
    } catch (err) {
      mostrarAlerta(alertaId, err.error || err.message || 'Error de conexión', 'error');
      btn.innerHTML = 'Iniciar sesión';
      btn.disabled = false;
      localStorage.clear();
    }
  });
</script>
</body>
</html>

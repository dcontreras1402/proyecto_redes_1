<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
  async function checkSession() {
    const token = localStorage.getItem('token');
    const user = getUsuario();

    if (!token || !user) return; // No hay sesión, mostrar formulario

    // Verificar que el token sigue siendo válido en el backend
    try {
      const res = await usuarios.get('/perfil');
      const perfil = res.usuario || res;
      if (perfil && perfil.nombre) {
        // Token válido: redirigir sin pedir credenciales de nuevo
        window.location.href = perfil.rol === 'admin' ? 'admin.html' : 'perfil.html';
      } else {
        limpiarSesion();
      }
    } catch (e) {
      // Token inválido o expirado: limpiar y mostrar formulario
      limpiarSesion();
    }
  }

  function limpiarSesion() {
    localStorage.removeItem('token');
    localStorage.removeItem('usuario');
  }

  checkSession();

  document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const alertaId = 'alerta';

    btn.innerHTML = '<span class="spinner"></span> Ingresando...';
    btn.disabled = true;

    // Limpiar sesión previa antes de intentar login nuevo
    limpiarSesion();

    const credentials = {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    };

    try {
      const res = await usuarios.post('/login', credentials);

      if (res && res.token) {
        localStorage.setItem('token', res.token);
        localStorage.setItem('usuario', JSON.stringify(res.usuario));

        mostrarAlerta(alertaId, 'Inicio de sesión exitoso. Redirigiendo...', 'success');

        setTimeout(() => {
          window.location.href = res.usuario.rol === 'admin' ? 'admin.html' : 'perfil.html';
        }, 1200);
      } else {
        throw new Error(res.error || 'Credenciales inválidas');
      }
    } catch (err) {
      mostrarAlerta(alertaId, err.error || err.message || 'Error de conexión', 'error');
      btn.innerHTML = 'Iniciar sesión';
      btn.disabled = false;
      limpiarSesion();
    }
  });
</script>
